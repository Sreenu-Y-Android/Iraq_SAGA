            letter-spacing: 0.18em;
            z-index: 99999;

            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 4px solid rgba(206, 17, 38, 0.35);
            border-top-color: #CE1126;
            animation: bskSplashSpin 0.9s linear infinite;
        }

        #initial-bsk-splash h1 {
            margin: 0;
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
        }

            margin: 0;
            font-size: 11px;
            opacity: 0.8;
            letter-spacing: 0.3em;
        }

        @keyframes bskSplashSpin {
            to {
                transform: rotate(360deg);

                    var splash = document.getElementById('initial-bsk-splash');
                    if (splash) {
                        splash.style.transition = 'opacity 0.45s ease';
                        splash.style.opacity = '0';
                        setTimeout(function () { splash && splash.remove(); }, 480);
                    }
                    clearInterval(iv);
                }
            }, 120);
        })();
